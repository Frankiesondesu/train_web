<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国南方公益慢火车旅游地图</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* 侧边栏样式 */
        .sidebar {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            max-height: 95vh;
            background: white;
            z-index: 1000;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow-y: auto;
        }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .control-group h3 { margin-top: 0; font-size: 16px; color: #333; }
        .route-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .route-item input { margin-right: 10px; }
        .color-box { width: 20px; height: 20px; border-radius: 3px; margin-right: 8px; display: inline-block; }
        
        /* 票价计算面板 */
        .price-calc { background: #f9f9f9; padding: 10px; border-radius: 5px; margin-top: 10px; }
        .price-calc select { width: 100%; margin-bottom: 10px; padding: 5px; }
        .price-result { font-weight: bold; color: #d32f2f; margin-top: 5px; }
        
        /* 弹窗样式 */
        .station-popup h3 { margin: 0 0 5px 0; color: #2c3e50; }
        .station-popup .rating { color: #f39c12; font-weight: bold; }
        .station-popup ul { padding-left: 20px; margin: 5px 0; }
        .station-popup .stay { font-size: 0.9em; color: #666; background: #eef; padding: 3px; border-radius: 3px; }
        
        /* 加载提示 */
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9); padding: 20px;
            border-radius: 8px; z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading">正在加载数据...</div>

<div class="sidebar">
    <h2>🚂 南方公益慢火车</h2>
    
    <div class="control-group">
        <h3>路线显示控制</h3>
        <div id="route-list">
            <!-- 动态生成路线列表 -->
        </div>
    </div>

    <div class="control-group">
        <h3>💰 票价查询 (普速)</h3>
        <div class="price-calc">
            <label>出发站:</label>
            <select id="from-station"><option value="">请选择</option></select>
            <label>到达站:</label>
            <select id="to-station"><option value="">请选择</option></select>
            <button onclick="calculatePrice()" style="width:100%; padding:8px; background:#007bff; color:white; border:none; cursor:pointer;">查询票价</button>
            <div id="price-output" class="price-result"></div>
            <div style="font-size:12px; color:#666; margin-top:5px;">
                * 数据来源于12306模拟接口<br>
                * 实际价格以车站为准
            </div>
        </div>
    </div>

    <div class="control-group">
        <h3>ℹ️ 使用说明</h3>
        <p style="font-size:12px; color:#555;">
            1. 勾选左侧复选框显示/隐藏对应慢火车路线。<br>
            2. 点击地图上的站点图标查看详细信息。<br>
            3. 使用上方工具查询任意两站间的普速列车参考票价。<br>
            4. 红色虚线表示主要干线连接，方便规划跨线旅行。
        </p>
    </div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 初始化地图
    const map = L.map('map').setView([26.0, 113.0], 6); // 中心点设为中国南方

    // 添加底图 (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let routesData = [];
    let layerGroups = {};
    let allStations = [];

    // 1. 加载外部 JSON 数据
    async function loadData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error("无法加载 data.json");
            routesData = await response.json();
            initMapLayers();
            populateStationSelects();
        } catch (error) {
            alert("加载数据失败：" + error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 2. 初始化图层
    function initMapLayers() {
        const routeListDiv = document.getElementById('route-list');
        
        routesData.routes.forEach(route => {
            // 创建图层组
            const group = L.layerGroup().addTo(map);
            layerGroups[route.id] = group;

            // 绘制路线连线
            const latlngs = route.stations.map(s => [s.lat, s.lng]);
            L.polyline(latlngs, { color: route.color, weight: 4, opacity: 0.8, dashArray: '10, 10' }).addTo(group);

            // 添加站点标记
            route.stations.forEach(station => {
                allStations.push(station);
                const marker = L.circleMarker([station.lat, station.lng], {
                    radius: 8,
                    fillColor: route.color,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).bindPopup(`
                    <div class="station-popup">
                        <h3>${station.name} (${station.code})</h3>
                        <p class="rating">⭐ ${station.rating} / 5.0</p>
                        <p>${station.desc}</p>
                        <b>景点:</b>
                        <ul>${station.attractions.map(a => `<li>${a}</li>`).join('')}</ul>
                        <div class="stay">🏠 住宿: ${station.stay_info}</div>
                    </div>
                `);
                marker.addTo(group);
            });

            // 创建控制面板项
            const div = document.createElement('div');
            div.className = 'route-item';
            div.innerHTML = `
                <input type="checkbox" id="${route.id}" checked onchange="toggleRoute('${route.id}')">
                <span class="color-box" style="background:${route.color}"></span>
                <label for="${route.id}">${route.name}</label>
            `;
            routeListDiv.appendChild(div);
        });

        // 绘制枢纽连接线 (模拟干线)
        drawHubLines();
    }

    // 绘制枢纽之间的普通干线连接
    function drawHubLines() {
        routesData.hubs.forEach(hub => {
            // 添加枢纽大圆点
            L.circleMarker([hub.lat, hub.lng], {
                radius: 12,
                fillColor: "#333",
                color: "#fff",
                weight: 2,
                fillOpacity: 1
            }).bindPopup(`<b>交通枢纽：${hub.name}</b><br>可换乘前往：${hub.connections.join(', ')}`).addTo(map);
            
            // 这里简单演示，实际应根据真实路网绘制
            // 暂时不画具体的长线，避免地图过于杂乱，依靠慢火车路线展示
        });
    }

    // 切换路线显示
    window.toggleRoute = function(id) {
        if (layerGroups[id]) {
            if (document.getElementById(id).checked) {
                map.addLayer(layerGroups[id]);
            } else {
                map.removeLayer(layerGroups[id]);
            }
        }
    };

    // 填充下拉框
    function populateStationSelects() {
        const fromSel = document.getElementById('from-station');
        const toSel = document.getElementById('to-station');
        
        // 去重
        const uniqueStations = [];
        const mapTemp = new Map();
        for (const item of allStations) {
            if(!mapTemp.has(item.code)){
                mapTemp.set(item.code, true);
                uniqueStations.push(item);
            }
        }

        uniqueStations.sort((a,b) => a.name.localeCompare(b.name));

        uniqueStations.forEach(s => {
            const opt1 = new Option(`${s.name} (${s.code})`, s.code);
            const opt2 = new Option(`${s.name} (${s.code})`, s.code);
            fromSel.add(opt1);
            toSel.add(opt2);
        });
    }

    // 3. 计算票价逻辑
    window.calculatePrice = async function() {
        const fromCode = document.getElementById('from-station').value;
        const toCode = document.getElementById('to-station').value;
        const output = document.getElementById('price-output');

        if (!fromCode || !toCode) {
            output.innerHTML = "请选择出发和到达站点";
            return;
        }
        if (fromCode === toCode) {
            output.innerHTML = "出发站和到达站不能相同";
            return;
        }

        output.innerHTML = "正在查询 12306 数据...";

        // 构造 12306 查询 URL
        // 注意：直接前端调用 12306 可能会遇到 CORS 跨域问题。
        // 在实际生产环境中，这需要一个后端代理。
        // 这里为了演示功能，我们尝试直接访问，如果失败则显示模拟数据提示。
        
        const date = new Date();
        date.setDate(date.getDate() + 1); // 明天
        const dateStr = date.toISOString().split('T')[0];
        
        const url = `https://kyfw.12306.cn/otn/leftTicketPrice/queryAllPublicPrice?leftTicketDTO.train_date=${dateStr}&leftTicketDTO.from_station=${fromCode}&leftTicketDTO.to_station=${toCode}&purpose_codes=ADULT`;

        try {
            // 尝试 Fetch (大概率会被 CORS 拦截)
            const resp = await fetch(url);
            if (!resp.ok) throw new Error("Network response was not ok");
            const data = await resp.json();
            
            if (data.data && data.data.price) {
                // 解析真实数据逻辑 (需根据 12306 实际返回结构调整)
                // 12306 返回结构复杂，此处简化处理
                output.innerHTML = `查询成功 (实时数据)`; 
            } else {
                throw new Error("No price data");
            }
        } catch (e) {
            console.warn("Direct 12306 access failed (CORS), using simulation logic.", e);
            
            // --- 模拟 fallback 逻辑 (因为浏览器直接调 12306 必挂) ---
            // 在真实项目中，你需要一个 Python/Node.js 后端来请求 12306
            // 这里为了让你看到效果，我根据距离估算一个硬座价格
            const s1 = allStations.find(s => s.code === fromCode);
            const s2 = allStations.find(s => s.code === toCode);
            
            if (s1 && s2) {
                // 简单的球面距离公式估算公里数
                const R = 6371; 
                const dLat = (s2.lat - s1.lat) * Math.PI / 180;
                const dLon = (s2.lng - s1.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(s1.lat * Math.PI / 180) * Math.cos(s2.lat * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c;
                
                // 普速硬座大概 0.05-0.06 元/公里
                const price = Math.round(distance * 0.058);
                
                output.innerHTML = `
                    <div style="color:#d32f2f">⚠️ 12306 接口存在跨域限制，以下为基于里程的估算价</div>
                    <div>距离：约 ${Math.round(distance)} 公里</div>
                    <div>硬座参考价：¥${price} 元</div>
                    <div>硬卧参考价：¥${Math.round(price * 1.8)} 元</div>
                    <a href="https://www.12306.cn" target="_blank" style="font-size:12px">点击前往 12306 官网购买</a>
                `;
            } else {
                output.innerHTML = "未找到站点信息";
            }
        }
    };

    // 启动
    loadData();

</script>
</body>
</html>
